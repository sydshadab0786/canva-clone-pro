# Reverse proxy: web app + API + Socket.io on one origin.
# TLS termination happens here in production (mount certs, add a 443 server).

upstream ccp_web {
  server web:3000;
}
upstream ccp_api {
  server api:4000;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 60m; # allow media uploads
  gzip on;
  gzip_types text/plain text/css application/json application/javascript image/svg+xml;

  # API (REST + Swagger + metrics)
  location /api/ {
    proxy_pass http://ccp_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Socket.io (real-time collaboration) — requires upgrade headers.
  location /socket.io/ {
    proxy_pass http://ccp_api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
  }

  # Everything else → Next.js
  location / {
    proxy_pass http://ccp_web;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
