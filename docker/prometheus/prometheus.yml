global:
  scrape_interval: 15s

scrape_configs:
  - job_name: ccp-api
    # The API exposes metrics under the global prefix + version.
    metrics_path: /api/v1/metrics
    static_configs:
      - targets: ["api:4000"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
